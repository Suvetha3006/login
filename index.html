<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background: linear-gradient(135deg,#6a11cb,#2575fc);
    }

    .container{
        background:white;
        width:350px;
        padding:40px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
        color:#333;
    }

    .input-box{
        margin-bottom:20px;
    }

    .input-box input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
        outline:none;
    }

    .input-box input:focus{
        border-color:#2575fc;
    }

    .remember{
        display:flex;
        justify-content:space-between;
        font-size:14px;
        margin-bottom:20px;
    }

    .remember a{
        text-decoration:none;
        color:#2575fc;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#2575fc;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#1b5edb;
    }

    .signup{
        text-align:center;
        margin-top:20px;
        font-size:14px;
    }

    .signup a{
        text-decoration:none;
        color:#2575fc;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form>
        <div class="input-box">
            <input type="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="remember">
            <label>
                <input type="checkbox"> Remember Me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>
    </form>
</div>

</body>
</html>
